name: Import upstream once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/import-upstream-once.yml

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Check out CodeFont
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone qr-font upstream
        run: git clone --depth 1 https://github.com/jimparis/qr-font.git /tmp/qr-font-upstream

      - name: Replace working tree with upstream snapshot
        run: |
          rsync -a --delete --exclude='.git/' /tmp/qr-font-upstream/ ./

      - name: Commit exact upstream snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import jimparis/qr-font upstream snapshot" || exit 0
          git push origin HEAD:main
