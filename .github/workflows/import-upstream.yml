name: Import upstream qr-font

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out CodeFont
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone upstream repository
        run: git clone --branch master --depth 1 https://github.com/jimparis/qr-font.git /tmp/qr-font

      - name: Replace repository contents with upstream snapshot
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/qr-font/. .
          rm -rf .git

      - name: Commit imported snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import jimparis/qr-font upstream snapshot"
          git push origin main
